name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  deployments: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Unlock deployments
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python -c "
          import urllib.request, json, os, urllib.error
          token = os.getenv('GITHUB_TOKEN')
          repo = os.getenv('GITHUB_REPOSITORY')
          headers = {
              'Authorization': f'token {token}',
              'Accept': 'application/vnd.github.v3+json'
          }
          
          # List deployments
          url = f'https://api.github.com/repos/{repo}/deployments'
          req = urllib.request.Request(url, headers=headers)
          try:
              with urllib.request.urlopen(req) as r:
                  deps = json.loads(r.read().decode('utf-8'))
              print(f'Trovati {len(deps)} deploy.')
              for d in deps:
                  dep_id = d['id']
                  sha = d['sha']
                  print(f'Disattivo ed elimino deploy {dep_id} (SHA: {sha})')
                  
                  # 1. Set state to inactive to unlock
                  status_url = f'https://api.github.com/repos/{repo}/deployments/{dep_id}/statuses'
                  status_data = json.dumps({'state': 'inactive'}).encode('utf-8')
                  status_headers = {
                      **headers,
                      'Content-Type': 'application/json',
                      'Accept': 'application/vnd.github.ant-man-preview+json'
                  }
                  status_req = urllib.request.Request(status_url, data=status_data, headers=status_headers, method='POST')
                  try:
                      with urllib.request.urlopen(status_req) as sr:
                          print(f'Stato impostato su inactive per il deploy {dep_id}')
                  except urllib.error.HTTPError as e_status:
                      print(f'Impossibile impostare stato inactive per {dep_id}: {e_status.code} - {e_status.read().decode()}')
                  
                  # 2. Delete deployment
                  del_url = f'https://api.github.com/repos/{repo}/deployments/{dep_id}'
                  del_req = urllib.request.Request(del_url, headers=headers, method='DELETE')
                  try:
                      with urllib.request.urlopen(del_req) as dr:
                          print(f'Deploy {dep_id} eliminato con successo.')
                  except urllib.error.HTTPError as e_del:
                      print(f'Errore eliminazione deploy {dep_id}: {e_del.code} - {e_del.read().decode()}')
          except urllib.error.HTTPError as e:
              print(f'Errore API: {e.code} - {e.read().decode()}')
              raise e
          "

      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
