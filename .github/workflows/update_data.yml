name: Update Dashboard Data

on:
  schedule:
    # Runs at 05:00 UTC (07:00 Italian summer time / 06:00 winter time) every day
    - cron: '0 5 * * *'
  workflow_dispatch: # Allows manual triggering from the GitHub Actions UI

permissions:
  contents: write # Needed to allow the workflow to commit and push changes back to the repo

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run scraper script
      run: python update_data.py

    - name: Commit and push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add dashboard_data.json
        # Commit only if there are changes to dashboard_data.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update dashboard data" && git push)
